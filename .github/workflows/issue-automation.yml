name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            
            // Category labels
            const categoryLabels = [];
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');
            
            // Priority labels
            let priorityLabel = 'priority-medium'; // Default
            if (body.includes('critical') || body.includes('urgent') || body.includes('production') || body.includes('outage') ||
                title.includes('critical') || title.includes('urgent') || title.includes('production') || title.includes('outage')) {
              priorityLabel = 'priority-critical';
            } else if (body.includes('important') || body.includes('high') || body.includes('blocking') ||
                       title.includes('important') || title.includes('high') || title.includes('blocking')) {
              priorityLabel = 'priority-high';
            } else if (body.includes('low') || body.includes('nice-to-have') || body.includes('minor') ||
                       title.includes('low') || title.includes('nice-to-have') || title.includes('minor')) {
              priorityLabel = 'priority-low';
            }
            
            // Add all required labels
            const labels = [...categoryLabels, priorityLabel, 'needs-triage'];
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labels
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create Epic Subtasks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const taskNames = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];
            
            // Create sub-issues
            const subIssueNumbers = [];
            for (let i = 0; i < taskNames.length; i++) {
              const taskNumber = i + 1;
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${taskNumber}: ${taskNames[i]}`;
              const subBody = `Related to #${parentNumber}`;
              
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subIssueNumbers.push(subIssue.data.number);
            }
            
            // Update parent issue with subtask checklist
            const checklist = subIssueNumbers.map((num, idx) => `- [ ] Task ${idx+1}: #${num}`).join('\n');
            const updatedBody = `${issue.body || ''}\n\n## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Auto-Response and Follow-Up
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const labels = issue.labels.map(l => l.name);
            const isBug = labels.includes('bug');
            const isEpic = labels.includes('epic');
            const isMaintenance = labels.includes('maintenance');
            const isPriorityHigh = labels.includes('priority-high');
            const isPriorityCritical = labels.includes('priority-critical');
            
            // Check if this is the author's first issue in this repo
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });
            
            const isFirstContributor = allIssues.length === 1; // Only current issue
            
            // Add first-time contributor label if needed
            if (isFirstContributor) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }
            
            // Post welcome message for first-time contributors
            if (isFirstContributor) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Welcome @${author}! Thank you for creating your first issue in this repository! We'll review it shortly.`
              });
            }
            
            // Post type-specific response comment
            let commentBody = '';
            if (isBug) {
              commentBody = "Bug Report Guidelines: Please ensure you've provided all necessary details (steps to reproduce, environment, expected/actual behavior) to help us resolve this issue quickly.";
            } else if (isEpic) {
              commentBody = "Feature Request Process: This epic will be broken down into subtasks. We'll review the overall plan and prioritize the work shortly.";
            } else if (isMaintenance) {
              commentBody = "Maintenance Guidelines: Maintenance tasks are reviewed weekly. We'll schedule this task in the next maintenance window.";
            }
            
            if (commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }
            
            // Set milestone for high/critical priority issues
            if (isPriorityHigh || isPriorityCritical) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: 1 // Assumes "v1.0.0" milestone exists (create if missing if needed)
                });
              } catch (error) {
                console.log("Milestone 'v1.0.0' not found, skipping milestone assignment");
              }
            }
            
            // Update status labels: replace needs-triage with needs-review
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });